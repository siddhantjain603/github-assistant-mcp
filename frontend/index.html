<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --user-bg:   #1f6feb;
      --bot-bg:    #1c2128;
      --danger:    #f85149;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: var(--accent2);
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.25);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    .aside-label {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      padding-left: 4px;
    }

    .suggestion-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      line-height: 1.4;
      transition: all 0.15s ease;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,0.06);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
      margin-top: auto;
    }

    .reset-btn:hover {
      background: rgba(248,81,73,0.1);
      border-color: var(--danger);
    }

    /* ── Chat area ── */
    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.4s ease;
    }

    .empty-icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      opacity: 0.6;
    }

    .empty-state p {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      max-width: 300px;
      line-height: 1.6;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 10px;
      animation: slideUp 0.2s ease;
      max-width: 820px;
      width: 100%;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot  { align-self: flex-start; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--user-bg); }
    .message.bot  .avatar { background: var(--border); }

    .bubble {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.875rem;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-radius: 10px 2px 10px 10px;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 2px 10px 10px 10px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 10px 14px;
      border-radius: 8px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.82rem;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      height: 42px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #send-btn:hover:not(:disabled) { background: #79c0ff; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--muted);
      text-align: center;
      padding: 4px 0 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">🐙</div>
      <div>
        <div class="header-title">GitHub Assistant</div>
        <div class="header-sub">MCP · LangChain · Azure OpenAI · gpt-4o</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      online
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Sidebar -->
    <aside>
      <div class="aside-label">Try asking</div>

      <button class="suggestion-btn" onclick="fillInput('List all my repositories')">
        📦 List all my repos
      </button>
      <button class="suggestion-btn" onclick="fillInput('Show details of my medical-rag-chatbot-aws-bedrock repo')">
        🔍 Details of a repo
      </button>
      <button class="suggestion-btn" onclick="fillInput('What are the open issues in github-assistant-mcp?')">
        🐛 Open issues in a repo
      </button>
      <button class="suggestion-btn" onclick="fillInput('How many stars does brand-guardian have?')">
        ⭐ Stars on a repo
      </button>
      <button class="suggestion-btn" onclick="fillInput('Which of my repos use Python?')">
        🐍 Repos by language
      </button>
      <button class="suggestion-btn" onclick="fillInput('Show closed issues in medical-rag-chatbot-aws-bedrock')">
        ✅ Closed issues
      </button>

      <div class="divider"></div>

      <button class="reset-btn" onclick="resetChat()">
        🗑 Clear conversation
      </button>
    </aside>

    <!-- Chat -->
    <div class="chat-wrapper">
      <div id="chat-messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🐙</div>
          <h2>Ask me about your GitHub</h2>
          <p>I can list your repos, fetch issues, and give you details about any repository using real GitHub data.</p>
        </div>
      </div>

      <div style="padding: 0 24px;">
        <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
      </div>

      <div class="input-area">
        <textarea
          id="user-input"
          placeholder="Ask about your repositories or issues..."
          rows="1"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">Send →</button>
      </div>
    </div>

  </main>

  <script>
    const input    = document.getElementById('user-input');
    const sendBtn  = document.getElementById('send-btn');
    const messages = document.getElementById('chat-messages');
    const emptyState = document.getElementById('empty-state');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function fillInput(text) {
      input.value = text;
      input.focus();
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    function appendMessage(role, content) {
      // Hide empty state on first message
      if (emptyState) emptyState.style.display = 'none';

      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messages.appendChild(msg);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messages.appendChild(msg);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        const data = await res.json();
        removeTyping();

        if (res.ok) {
          appendMessage('bot', data.response);
        } else {
          appendMessage('bot', `⚠️ Error: ${data.detail || 'Something went wrong.'}`);
        }
      } catch (err) {
        removeTyping();
        appendMessage('bot', `⚠️ Network error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function resetChat() {
      try {
        await fetch('/reset', { method: 'POST' });
        messages.innerHTML = '';
        messages.appendChild(emptyState);
        emptyState.style.display = 'flex';
      } catch (err) {
        console.error('Reset failed:', err);
      }
    }
  </script>
</body>
</html>
